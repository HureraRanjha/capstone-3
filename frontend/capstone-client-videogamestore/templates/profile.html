
<aside class="filter-box profile-aside">
    <div class="profile-avatar"><i class="fa-solid fa-user-large"></i></div>
    <h3>Account</h3>
    <p class="muted-text">Manage your shipping and contact details. These are used to fill in your orders at checkout.</p>
</aside>
<div id="content" class="content-form">
    <h1>My Profile</h1>

    <div class="form-grid">
        <div class="form-floating mb-3">
            <input type="text" class="form-control" id="firstName" value='{{firstName}}'>
            <label for="firstName">First Name</label>
        </div>
        <div class="form-floating mb-3">
            <input type="text" class="form-control" id="lastName" value='{{lastName}}'>
            <label for="lastName">Last Name</label>
        </div>
        <div class="form-floating mb-3">
            <input type="text" class="form-control" id="phone" value='{{phone}}'>
            <label for="phone">Phone</label>
        </div>
        <div class="form-floating mb-3">
            <input type="text" class="form-control" id="email" value='{{email}}'>
            <label for="email">Email</label>
        </div>
        <div class="form-floating mb-3 form-span-2">
            <input type="text" class="form-control" id="address" value='{{address}}'>
            <label for="address">Address</label>
        </div>
        <div class="form-floating mb-3">
            <input type="text" class="form-control" id="city" value='{{city}}'>
            <label for="city">City</label>
        </div>
        <div class="form-floating mb-3">
            <input type="text" class="form-control" id="state" value='{{state}}'>
            <label for="state">State</label>
        </div>
        <div class="form-floating mb-3">
            <input type="text" class="form-control" id="zip" value='{{zip}}'>
            <label for="zip">Zip</label>
        </div>
    </div>

    <button class="btn btn-primary profile-save" onclick="saveProfile()">
        <i class="fa-solid fa-floppy-disk"></i> Save changes
    </button>
</div>
