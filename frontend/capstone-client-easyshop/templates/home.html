<section class="hero">
    <div class="hero-content">
        <span class="hero-badge"><i class="fa-solid fa-bolt"></i> New season drop</span>
        <h1>Find your next<br><span class="hero-accent">favorite thing</span></h1>
        <p>Curated products, honest prices, delivered fast. Browse the collection and fill your cart.</p>
        <a href="#content" class="btn btn-primary hero-cta">Shop now <i class="fa-solid fa-arrow-down-long"></i></a>
    </div>
    <div class="hero-art" aria-hidden="true">
        <i class="fa-solid fa-bag-shopping"></i>
        <span class="hero-blob hero-blob-1"></span>
        <span class="hero-blob hero-blob-2"></span>
    </div>
</section>

<aside class="filter-box">
    <h3>Filter</h3>

    <div class="form-floating mb-3">
        <select name="" id="category-select" class="form-select"
            onchange="setCategory(this)"
        >
            <option value="0">Show All</option>
        </select>
        <label for="category-select">Category</label>
    </div>
    <div class="filter-group">
        <label for="min-price" class="form-label">Minimum Price: <strong>$<span id="min-price-display">0</span></strong></label>
        <input type="range" class="form-range" id="min-price" min="0" max="1500" value="0" onchange="setMinPrice(this)">
    </div>
    <div class="filter-group">
        <label for="max-price" class="form-label">Maximum Price: <strong>$<span id="max-price-display">1500</span></strong></label>
        <input type="range" class="form-range" id="max-price" min="0" max="1500" value="1500" onchange="setMaxPrice(this)">
    </div>

    <div class="form-floating mb-3">
        <select name="" id="subcategory-select" class="form-select"
                onchange="setSubcategory(this)"
        >
            <option value="">Show All</option>
            <option>Black</option>
            <option>White</option>
            <option>Gray</option>
            <option>Blue</option>
            <option>Red</option>
            <option>Brown</option>
            <option>Silver</option>
            <option>Charcoal</option>
            <option>Navy</option>
            <option>Green</option>
            <option>Orange</option>
            <option>Yellow</option>
            <option>Pink</option>
            <option>Clear</option>
            <option>Tan</option>
            <option>Burgundy</option>
            <option>Maroon</option>
            <option>Mint</option>
            <option>Lavender</option>
            <option>Teal</option>
            <option>Olive</option>
            <option>Khaki</option>
            <option>Turquoise</option>
        </select>
        <label for="subcategory-select">Color</label>
    </div>

</aside>
<div id="content" class="content"></div>
